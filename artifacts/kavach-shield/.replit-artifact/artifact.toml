kind = "web"
previewPath = "/"
title = "Kavach Shield OM"
version = "1.0.0"
id = "artifacts/kavach-shield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19977

[services.development]
run = "pnpm --filter @workspace/kavach-shield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kavach-shield", "run", "build" ]
publicDir = "artifacts/kavach-shield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19977"
BASE_PATH = "/"
